<?xml version="1.0" encoding="UTF-8"?>
<!-- Open Graph social card source — 1200×630.
     Aesthetic mirrors theme/Portfolio.vue hero: космический фиолет void (#0a0020),
     serif name with violet glow, roles line, treble-clef + staff motif, spectrum
     particle dots. Rasterize to public/og.png (see docs/plans Post-Completion). -->
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Космический фиолет radial glow over the void base -->
    <radialGradient id="bg" cx="50%" cy="42%" r="75%">
      <stop offset="0%"  stop-color="#1a0540"/>
      <stop offset="55%" stop-color="#0d0226"/>
      <stop offset="100%" stop-color="#0a0020"/>
    </radialGradient>
    <!-- Spectrum accent bar = 6 «сферы круга жизни» colors -->
    <linearGradient id="spectrum" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#b34dff"/>
      <stop offset="20%"  stop-color="#1accff"/>
      <stop offset="40%"  stop-color="#33ff4d"/>
      <stop offset="60%"  stop-color="#ff6688"/>
      <stop offset="80%"  stop-color="#ffaa22"/>
      <stop offset="100%" stop-color="#ff9933"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="#0a0020"/>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- ── Connecting-particle dots (subtle, spectrum-tinted) ───────── -->
  <g opacity="0.9">
    <line x1="150" y1="120" x2="300" y2="180" stroke="rgba(200,180,255,0.10)" stroke-width="1"/>
    <line x1="300" y1="180" x2="240" y2="300" stroke="rgba(200,180,255,0.08)" stroke-width="1"/>
    <line x1="980" y1="150" x2="1080" y2="240" stroke="rgba(200,180,255,0.09)" stroke-width="1"/>
    <line x1="1080" y1="240" x2="940" y2="320" stroke="rgba(200,180,255,0.07)" stroke-width="1"/>
    <circle cx="150"  cy="120" r="4" fill="#b34dff" opacity="0.55"/>
    <circle cx="300"  cy="180" r="3" fill="#1accff" opacity="0.5"/>
    <circle cx="240"  cy="300" r="3" fill="#33ff4d" opacity="0.45"/>
    <circle cx="980"  cy="150" r="3" fill="#ff6688" opacity="0.5"/>
    <circle cx="1080" cy="240" r="4" fill="#ffaa22" opacity="0.5"/>
    <circle cx="940"  cy="320" r="3" fill="#ff9933" opacity="0.45"/>
    <circle cx="1040" cy="90"  r="2" fill="#1accff" opacity="0.4"/>
    <circle cx="110"  cy="430" r="2" fill="#ff6688" opacity="0.4"/>
  </g>

  <!-- ── Name + roles ─────────────────────────────────────────────── -->
  <text x="600" y="278" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif" font-size="104" font-weight="700"
        fill="#ffffff" filter="url(#glow)">Oleg Sidorkin</text>

  <text x="600" y="344" text-anchor="middle"
        font-family="-apple-system, 'Segoe UI', sans-serif" font-size="30"
        letter-spacing="10" fill="rgba(200,180,255,0.62)">ENGINEER · MUSICIAN · BUILDER</text>

  <!-- spectrum accent bar under the name -->
  <rect x="470" y="372" width="260" height="4" rx="2" fill="url(#spectrum)" opacity="0.92"/>

  <!-- ── Staff + treble clef motif (lower third) ──────────────────── -->
  <g transform="translate(0,470)">
    <line x1="120" y1="0"  x2="1080" y2="0"  stroke="rgba(200,180,255,0.12)" stroke-width="1.5"/>
    <line x1="120" y1="16" x2="1080" y2="16" stroke="rgba(200,180,255,0.12)" stroke-width="1.5"/>
    <line x1="120" y1="32" x2="1080" y2="32" stroke="rgba(200,180,255,0.12)" stroke-width="1.5"/>
    <line x1="120" y1="48" x2="1080" y2="48" stroke="rgba(200,180,255,0.12)" stroke-width="1.5"/>
    <line x1="120" y1="64" x2="1080" y2="64" stroke="rgba(200,180,255,0.12)" stroke-width="1.5"/>
    <text x="150" y="62" font-family="'Times New Roman', Georgia, serif" font-size="118"
          fill="rgba(179,77,255,0.55)" filter="url(#glow)">&#x1D11E;</text>
    <!-- notes on the staff in spectrum colors -->
    <circle cx="430" cy="48" r="8" fill="#33ff4d" opacity="0.7"/>
    <circle cx="560" cy="16" r="8" fill="#1accff" opacity="0.7"/>
    <circle cx="690" cy="32" r="8" fill="#ff6688" opacity="0.7"/>
    <circle cx="820" cy="0"  r="8" fill="#ffaa22" opacity="0.7"/>
    <circle cx="950" cy="24" r="8" fill="#b34dff" opacity="0.7"/>
  </g>

  <!-- ── Domain wordmark ──────────────────────────────────────────── -->
  <text x="600" y="600" text-anchor="middle"
        font-family="'SF Mono', 'Fira Code', ui-monospace, monospace" font-size="22"
        letter-spacing="3" fill="rgba(200,180,255,0.40)">alterfo.github.io</text>
</svg>
