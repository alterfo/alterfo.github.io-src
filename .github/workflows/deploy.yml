name: Deploy

on:
  push:
    branches: [ master, vitepress-portfolio ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup emsdk
      uses: mymindstorm/setup-emsdk@v14

    - name: Use Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Install dependencies
      run: npm ci

    - name: Build AR Engine WASM
      run: |
        if [ -d "ar-engine/engine" ]; then
          make -C ar-engine/engine/ || echo "Warning: WASM build failed, skipping"
        fi

    - name: Build VitePress
      run: npx vitepress build

    - name: Copy AR Engine assets
      run: |
        if [ -d "ar-engine/web" ]; then
          mkdir -p .vitepress/dist/ar
          cp -r ar-engine/web/. .vitepress/dist/ar/
        fi

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        deploy_key: ${{ secrets.DEPLOY_KEY }}
        external_repository: alterfo/alterfo.github.io
        publish_branch: master
        publish_dir: ./.vitepress/dist
        user_name: 'github-actions[bot]'
        user_email: 'github-actions[bot]@users.noreply.github.com'
        commit_message: 'deploy'
