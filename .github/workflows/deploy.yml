name: Deploy

on:
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup emsdk
      uses: mymindstorm/setup-emsdk@v14

    - name: Use Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: 22

    - name: Install dependencies
      run: npm ci

    - name: Build AR Engine WASM
      run: |
        if [ -d "ar-engine/engine" ]; then
          make -C ar-engine/engine/ || echo "Warning: WASM build failed, skipping"
        fi

    # The pose model (~10.8 MB) is gitignored; fetch it at build time so /openpose
    # works on prod. Cached between runs — Google's "latest" URL rarely changes.
    - name: Cache MediaPipe pose model
      uses: actions/cache@v4
      with:
        path: public/mediapipe/pose_landmarker_full.task
        key: mediapipe-pose-landmarker-full-float16-v1

    - name: Download MediaPipe pose model
      run: |
        if [ ! -f public/mediapipe/pose_landmarker_full.task ]; then
          curl -fL "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_full/float16/latest/pose_landmarker_full.task" \
            -o public/mediapipe/pose_landmarker_full.task
        fi

    # npm run build (NOT npx vitepress build): the prebuild hook runs
    # mediapipe:copy, which copies the gitignored WASM runtime from
    # node_modules into public/mediapipe/wasm/ — without it /openpose 404s.
    - name: Build VitePress
      run: npm run build

    - name: Copy AR Engine assets
      run: |
        if [ -d "ar-engine/web" ]; then
          mkdir -p .vitepress/dist/ar
          cp -r ar-engine/web/. .vitepress/dist/ar/
        fi

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        deploy_key: ${{ secrets.DEPLOY_KEY }}
        external_repository: alterfo/alterfo.github.io
        publish_branch: master
        publish_dir: ./.vitepress/dist
        user_name: 'github-actions[bot]'
        user_email: 'github-actions[bot]@users.noreply.github.com'
        commit_message: 'deploy'
